# ?????????????????????????????????????????????????????????????????????????????
#  RedConflictHub ? serveur HUB de Red Conflict
#  Lobby totalement verrouille : aucune interaction, aucune commande (sauf staff).
#  File d'attente integree avec titles + actionbar en temps reel.
# ?????????????????????????????????????????????????????????????????????????????

# Nom du serveur faction tel que defini dans velocity.toml ([servers]).
faction-server: faction

# true  = le joueur est ajoute automatiquement a la file (ou envoye si file desactivee) des sa connexion.
# false = le joueur reste au HUB et clique sur l'item de jonction.
auto-join: false

# Delai (en secondes) avant l'ajout automatique a la file si auto-join est active.
auto-join-delay-seconds: 1

# ?? File d'attente interne ???????????????????????????????????????????????????
# La file est geree directement par RedConflictHub.
# Chaque joueur clique sur l'item de jonction pour rejoindre la file.
# La file envoie automatiquement les joueurs vers le faction par vague (batch).
# Les joueurs avec hub.queue.bypass sont places en 1ère position.
queue:
  # Activer la file d'attente (false = envoi direct, comportement sans file).
  enabled: true

  # Nombre de joueurs envoyes vers le faction a chaque cycle.
  batch-size: 1

  # Intervalle d'envoi (ticks). 100 ticks = 5 secondes.
  send-interval-ticks: 100

  # Intervalle d'affichage du title/actionbar de position (ticks). 40 = 2 secondes.
  title-interval-ticks: 40

  # Affiche une actionbar (barre d'action) plutot qu'un title.
  # Laisser vide ("") pour utiliser les titles a la place.
  actionbar: "&7File d'attente &8\u2014 &cPosition &f#%pos% &8/ &f%total%"

  # Title affiché quand l'actionbar est desactivee.
  title-main: "&c&lFILE D'ATTENTE"
  title-sub:  "&7Position &c#%pos% &7sur &f%total%"

  # Title et message d'entree en file (joueur normal).
  join-title:   "&a&lFILE REJOINTE"
  join-sub:     "&7Tu es en position &c#%pos%"
  join-message: "&7File d'attente rejointe &8\u2014 position &c#%pos% &7sur &f%total%"

  # Title et message pour les joueurs avec hub.queue.bypass (places 1er).
  bypass-title:   "&6&lBYPASS FILE"
  bypass-sub:     "&7Tu as ete place en &c1\u00e8re position"
  bypass-message: "&6Tu as bypasse la file et es place en 1\u00e8re position !"

  # Message quand le joueur clique sur l'item alors qu'il est deja en file.
  already-message: "&7Tu es deja en file \u2014 position &c#%pos% &7sur &f%total%"

# ?? Item de jonction ?????????????????????????????????????????????????????????
join-item:
  enabled: true
  slot: 4
  material: COMPASS
  name: "&c&lREJOINDRE &f&lLE FACTION"
  lore:
    - "&7Clique pour rejoindre la file d'attente"
    - "&8Fichier d'attente gere par le HUB"

# Vide l'inventaire du joueur a la connexion au HUB.
clear-inventory-on-join: true

# ?? Spawn du lobby ???????????????????????????????????????????????????????????
spawn:
  set: false
  world: world
  x: 0.5
  y: 100.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# Anti-vide : si un joueur descend sous cette hauteur Y, il est renvoye au spawn.
void-teleport-y: 0

# ?? Monde ????????????????????????????????????????????????????????????????????
world:
  lock-time: true
  time: 6000

# ?? Title de bienvenue (a la connexion) ??????????????????????????????????????
# Placeholders : %player%, %prefix%, %grade%, %online%, %max%.
join-title:
  enabled: true
  title:    "&c&lRED &f&lCONFLICT"
  subtitle: "&7Bienvenue &f%prefix%%player% &c!"
  fade-in:  10
  stay:     60
  fade-out: 20

# ?? Tablist ???????????????????????????????????????????????????????????????????
tablist:
  enabled: true
  header:
    - ""
    - "&c&lRedConflict"
    - "&7Joueurs &8: &f%online% &8/ &7%max%"
    - ""
  footer:
    - ""
    - "&7Bienvenue dans le &c&lHUB"
    - ""

# ?? Grades ???????????????????????????????????????????????????????????????????
ranks:
  order:
    - admin
    - moderateur
    - youtubeur
    - immortel
    - elite
    - joueur
  default-prefix: "&7"

# ?? Noms au-dessus des tetes ??????????????????????????????????????????????????
nametags:
  enabled: true
  sort-by-rank: true

# ?? Messages de connexion / deconnexion ???????????????????????????????????????
# Laisser vide ("") pour masquer completement le message.
# Placeholders : %player% %prefix% %grade% %online% %max%.
join-quit:
  join-message: "&8[&a+&8] %prefix%&f%player% &7a rejoint le serveur. &8(&f%online%&8/&f%max%&8)"
  quit-message: "&8[&c-&8] %prefix%&7%player% &7a quitte le serveur."

# ?? Confort joueurs ???????????????????????????????????????????????????????????
comfort:
  walk-speed: 0.2
  block-chat: false
  double-jump:
    enabled: false
    power: 1.2

# ?? Messages divers ???????????????????????????????????????????????????????????
messages:
  prefix:           "&c&lRED &f&lCONFLICT &7\u00bb &f"
  joining:          "&7Connexion au serveur Faction en cours..."
  no-commands:      "&cLes commandes sont desactivees dans le HUB."
  no-chat:          "&cLe chat est desactive dans le HUB."
  no-permission:    "&cTu n'as pas la permission."
  reloaded:         "&aConfiguration rechargee avec succes."
  spawn-set:        "&aSpawn du HUB defini a ta position actuelle."
  player-not-found: "&cJoueur introuvable : &f%player%"
  sent:             "&a%player% a ete envoye vers le faction."
  usage:            "&7Usage : &f/hub <reload|setspawn|send|queue> [args]"
